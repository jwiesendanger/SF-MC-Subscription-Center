<script runat="server" language="JavaScript">
/*
  Phase 3 — Sync Verification Checklist
  UK Centralized Subscription Center | Human Resources POC
  ──────────────────────────────────────────────────────────
  PURPOSE
    A guided Phase 3 checklist embedded in the system as a
    cloud page. Provides org/DE reference metadata, step-by-step
    manual verification instructions, and Phase 4 prep notes.

  NOTE ON AUTOMATED PROBING
    WSProxy access to synced DEs is blocked in this SFMC instance
    across all page types and BU contexts. Phase 3 verification
    is therefore a manual process — this page guides that process
    and serves as a self-documenting reference artifact.

  SETUP
    Update the CONFIGURATION section below with actual values.
    Publish in the HR child BU as a Landing Page or Code Resource.
    Access while logged into Marketing Cloud.
*/

Platform.Load("Core", "1.1.5");
Platform.Response.SetResponseHeader("Content-Type", "text/html; charset=utf-8");

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// CONFIGURATION
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
var CFG = {
  OrgDisplayName:  "SF CRM Human Resources",
  OrgID:           "00DHu000003NQ7v",
  InstanceURL:     "https://inspiration-customer-3783.my.salesforce.com",
  MCChildBUMID:    "524007851",
  MCParentBUMID:   "10960095",
  SyncedDEName:    "Account_Salesforce_9",       // bare name in child BU Contact Builder
  SyncedDEforAMPscript: "ENT.Account_Salesforce_9", // ENT. prefix required in AMPscript LookupRows
  SFObject:        "Account",

  // Fields registered in the admin tool for this org.
  // Update this list when fields are added/removed via admin tool.
  Fields: [
    { APIName: "Email_Opt_Out__c", Label: "Email Opt Out" }
    // { APIName: "CommPref_Newsletters__c", Label: "Pref: Newsletters" },
  ]
};
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function h(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function isoNow() {
  var d = new Date();
  return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2)+
    " "+("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2)+":"+("0"+d.getSeconds()).slice(-2)+" UTC";
}

var isAuthorized = false;
try { var uid = Platform.Function.AuthenticatedMemberID(); if (uid && uid.toString().length > 0) isAuthorized = true; } catch(e) {}

if (!isAuthorized) {
  Write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Access Denied</title>' +
    "<style>body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh;background:#F0F4F8}" +
    ".box{background:#fff;border:1px solid #C0392B;border-radius:6px;padding:40px;max-width:480px;text-align:center}" +
    "h2{color:#C0392B;margin-bottom:12px}p{color:#555;font-size:13px}</style></head>" +
    '<body><div class="box"><h2>Access Denied</h2><p>Log in to Marketing Cloud before accessing this URL.</p></div></body></html>');
} else {

  var generatedAt = isoNow();
  var o = [];

  o.push('<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">');
  o.push('<meta name="viewport" content="width=device-width,initial-scale=1.0">');
  o.push("<title>Phase 3 — Sync Verification | UK Subscription Center</title><style>");
  o.push(":root{--bd:#003B75;--bm:#0033A0;--bl:#D9E6F2;--gn:#1D7A2E;--gnb:#D6EFD8;--or:#BB5500;--orb:#FFF3CD;--rd:#C0392B;--rdb:#FDECEA;--gl:#F5F5F5;--gm:#CCCCCC;--yw:#7A5C00;--ywb:#FFFBE6}");
  o.push("*{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#111;background:#F0F4F8}");
  o.push(".ph{background:var(--bd);color:#fff;padding:18px 32px 14px;border-bottom:4px solid #BF9B30}.ph h1{font-size:20px;font-weight:700}.ph p{font-size:12px;opacity:.8;margin-top:4px}");
  o.push(".ct{max-width:1000px;margin:28px auto;padding:0 24px 48px}");
  o.push(".card{background:#fff;border:1px solid var(--gm);border-radius:6px;margin-bottom:24px;overflow:hidden}");
  o.push(".ch{padding:10px 18px;font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase}");
  o.push(".ch-ref{background:#4A5568;color:#fff}.ch-check{background:var(--yw);color:#fff}.ch-prep{background:var(--bd);color:#fff}");
  o.push(".cb{padding:18px}");
  o.push(".mt{width:100%;border-collapse:collapse;font-size:13px}.mt td{padding:8px 12px;border-bottom:1px solid #EEE;vertical-align:top}.mt td:first-child{font-weight:600;color:#555;width:200px;white-space:nowrap}");
  o.push(".mt tr:last-child td{border-bottom:0}");
  o.push(".flist{width:100%;border-collapse:collapse;font-size:13px;margin-top:12px}");
  o.push(".flist th{background:var(--bd);color:#fff;padding:7px 12px;text-align:left;font-weight:600}");
  o.push(".flist td{padding:7px 12px;border-bottom:1px solid #EEE}.flist tr:last-child td{border-bottom:0}");
  o.push(".flist tr:nth-child(even){background:var(--gl)}");
  o.push(".cd{font-family:'Courier New',monospace;font-size:12px;color:#6B2A8A}");
  o.push(".cl{list-style:none;padding:0;margin:0}");
  o.push(".cl li{padding:12px 0;border-bottom:1px solid #EEE;display:grid;grid-template-columns:24px 1fr;gap:10px;align-items:start}");
  o.push(".cl li:last-child{border-bottom:0}");
  o.push(".cb-box{width:18px;height:18px;border:2px solid #AAA;border-radius:3px;margin-top:1px;flex-shrink:0}");
  o.push(".cl-title{font-size:13px;font-weight:700;margin-bottom:4px}");
  o.push(".cl-body{font-size:13px;color:#333;line-height:1.6}");
  o.push(".cl-note{font-size:11px;color:#777;margin-top:4px;line-height:1.5}");
  o.push(".ref-tag{display:inline-block;background:var(--bl);color:var(--bm);border:1px solid var(--bm);font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:6px;vertical-align:middle}");
  o.push(".warn{background:var(--orb);border:1px solid #C9A800;border-radius:4px;padding:8px 12px;font-size:12px;color:var(--yw);margin-top:8px}");
  o.push(".prep-table{width:100%;border-collapse:collapse;font-size:13px}");
  o.push(".prep-table td{padding:9px 12px;border-bottom:1px solid #EEE;vertical-align:top}.prep-table tr:last-child td{border-bottom:0}");
  o.push(".prep-table td:first-child{font-weight:600;color:#555;width:160px}");
  o.push(".pf{text-align:center;font-size:11px;color:#999;margin-top:40px;padding-top:16px;border-top:1px solid var(--gm)}");
  o.push("</style></head><body>");

  // Header
  o.push('<div class="ph"><h1>Phase 3 &mdash; Sync Verification Checklist</h1>');
  o.push("<p>UK Centralized Subscription Center &mdash; Human Resources POC &mdash; " + h(generatedAt) + "</p></div>");
  o.push('<div class="ct">');

  // ── CARD 1: Org & DE Reference ────────────────────────────
  o.push('<div class="card"><div class="ch ch-ref">&#128203; Reference &mdash; Org &amp; Synced DE</div><div class="cb">');
  o.push('<p style="font-size:13px;color:#555;margin-bottom:14px;">Hardcoded reference values for this org. Use these when navigating SFMC and Salesforce to complete the checklist below.</p>');
  o.push('<table class="mt">');
  o.push('<tr><td>CRM Org</td><td>' + h(CFG.OrgDisplayName) + ' &nbsp;<span class="cd">' + h(CFG.OrgID) + "</span></td></tr>");
  o.push('<tr><td>Instance URL</td><td><span class="cd">' + h(CFG.InstanceURL) + "</span></td></tr>");
  o.push('<tr><td>MC Child BU MID</td><td><span class="cd">' + h(CFG.MCChildBUMID) + "</span></td></tr>");
  o.push('<tr><td>MC Parent BU MID</td><td><span class="cd">' + h(CFG.MCParentBUMID) + "</span></td></tr>");
  o.push('<tr><td>Synced DE (Contact Builder)</td><td><span class="cd">' + h(CFG.SyncedDEName) + '</span><span class="ref-tag">child BU</span></td></tr>');
  o.push('<tr><td>Synced DE (AMPscript)</td><td><span class="cd">' + h(CFG.SyncedDEforAMPscript) + '</span><span class="ref-tag">ENT. prefix required</span></td></tr>');
  o.push('<tr><td>SF Object</td><td><span class="cd">' + h(CFG.SFObject) + "</span></td></tr>");
  o.push("</table>");

  // Field list
  o.push('<p style="font-size:12px;font-weight:700;color:#555;margin-top:16px;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;">Registered Fields (from admin tool)</p>');
  o.push('<table class="flist"><thead><tr><th>#</th><th>Field API Name</th><th>Display Label</th><th>SF Object</th></tr></thead><tbody>');
  for (var fi = 0; fi < CFG.Fields.length; fi++) {
    o.push("<tr><td>" + (fi+1) + '</td><td class="cd">' + h(CFG.Fields[fi].APIName) + "</td><td>" + h(CFG.Fields[fi].Label) + '</td><td class="cd">' + h(CFG.SFObject) + "</td></tr>");
  }
  o.push("</tbody></table>");
  o.push('<p class="cl-note" style="margin-top:10px;">This list is maintained in the page config, not auto-read from the admin tool. Update it here when fields are added or removed.</p>');
  o.push("</div></div>");

  // ── CARD 2: Manual Checklist ──────────────────────────────
  o.push('<div class="card"><div class="ch ch-check">&#9998; Manual Verification Checklist</div><div class="cb">');
  o.push('<p style="font-size:13px;color:#333;margin-bottom:16px;">Complete each step in order. Check the box when done. All steps must pass before proceeding to Phase 4.</p>');
  o.push('<ul class="cl">');

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">1 &mdash; Confirm the synced DE exists in the HR child BU</div>');
  o.push('<div class="cl-body">In MC, switch to the <strong>HR child BU (MID ' + h(CFG.MCChildBUMID) + ')</strong>.<br>Navigate to <strong>Contact Builder &rarr; Data Extensions</strong> and filter by <strong>Synchronized</strong>.<br>Confirm <span class="cd">' + h(CFG.SyncedDEName) + '</span> is listed.</div>');
  o.push('<div class="cl-note">If the DE is not listed, MC Connect has not synced the Account object for this org. Return to the MC Connect setup in Salesforce and verify the object is selected for sync.</div>');
  o.push("</div></li>");

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">2 &mdash; Confirm CommPref fields are enabled in the sync config</div>');
  o.push('<div class="cl-body">In the <strong>HR Salesforce org</strong> (<span class="cd">' + h(CFG.InstanceURL) + '</span>):<br><strong>Setup &rarr; Marketing Cloud &rarr; Integration &rarr; Field Mappings</strong>.<br>Find the <strong>' + h(CFG.SFObject) + '</strong> object. Confirm each field below has sync enabled:</div>');
  o.push('<div style="margin-top:8px;">');
  for (var fi2 = 0; fi2 < CFG.Fields.length; fi2++) {
    o.push('<div style="padding:3px 0;font-size:13px;">&#9633; <span class="cd">' + h(CFG.Fields[fi2].APIName) + "</span> &mdash; " + h(CFG.Fields[fi2].Label) + "</div>");
  }
  o.push('</div><div class="cl-note">If a field is not listed or not enabled: add/enable it, save, then trigger a manual sync (step 3).</div>');
  o.push("</div></li>");

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">3 &mdash; Trigger a manual sync and confirm columns appear</div>');
  o.push('<div class="cl-body">In MC &rarr; HR child BU &rarr; <strong>Contact Builder &rarr; Synchronized Data Extensions &rarr; ' + h(CFG.SyncedDEName) + ' &rarr; Refresh</strong>.<br>After the sync completes, open the DE and click the <strong>Fields</strong> tab. Confirm each CommPref field appears as a column.</div>');
  o.push('<div class="cl-note">Sync typically takes 5–15 minutes. If columns do not appear after a full sync, verify the field mapping in Salesforce is saved correctly (step 2).</div>');
  o.push("</div></li>");

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">4 &mdash; Confirm data is flowing (rows have values)</div>');
  o.push('<div class="cl-body">In Contact Builder, open <span class="cd">' + h(CFG.SyncedDEName) + '</span> &rarr; <strong>Records</strong> tab. Find any Account record and confirm the CommPref field columns have values (<span class="cd">True</span> or <span class="cd">False</span>).</div>');
  o.push('<div class="cl-note">Boolean values from the synced DE arrive as <span class="cd">True</span> / <span class="cd">False</span> (capital T/F) — not lowercase. Phase 4 AMPscript must handle both cases.</div>');
  o.push("</div></li>");

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">5 &mdash; Verify FLS on the MC Connect integration user</div>');
  o.push('<div class="cl-body">In Salesforce Setup: find the <strong>MC Connect integration user\'s Profile or Permission Set</strong>.<br>Open <strong>Field Permissions &rarr; ' + h(CFG.SFObject) + ' object</strong>.<br>Confirm <strong>Read</strong> and <strong>Edit</strong> are both checked for:</div>');
  o.push('<div style="margin-top:8px;">');
  for (var fi3 = 0; fi3 < CFG.Fields.length; fi3++) {
    o.push('<div style="padding:3px 0;font-size:13px;">&#9633; <span class="cd">' + h(CFG.Fields[fi3].APIName) + "</span></div>");
  }
  o.push('<div style="padding:3px 0;font-size:13px;">&#9633; <span class="cd">HasOptedOutOfEmail</span></div>');
  o.push('<div style="padding:3px 0;font-size:13px;">&#9633; <span class="cd">DoNotContact</span></div>');
  o.push('</div><div class="warn">&#9888; Missing FLS causes <span class="cd">UpdateSingleSalesforceObject()</span> to return 0 silently. The preference center will appear to save but the CRM record will not update.</div>');
  o.push("</div></li>");

  o.push('<li><div class="cb-box"></div><div>');
  o.push('<div class="cl-title">6 &mdash; Record the verified DE name for Phase 4/5</div>');
  o.push('<div class="cl-body">Confirm the exact DE name to use in Phase 5 child relay pages:<br><span class="cd">' + h(CFG.SyncedDEforAMPscript) + '</span> &mdash; use this in AMPscript <span class="cd">LookupRows()</span> calls.<br>Without the <span class="cd">ENT.</span> prefix, LookupRows returns 0 rows silently.</div>');
  o.push('<div class="cl-note">The ENT. prefix is required in AMPscript on child BU pages to reach the synced DE. This is the production-verified pattern from the EXT team.</div>');
  o.push("</div></li>");

  o.push("</ul></div></div>");

  // ── CARD 3: Phase 4 Prep Notes ────────────────────────────
  o.push('<div class="card"><div class="ch ch-prep">Phase 4 Prep &mdash; Verified Production Patterns</div><div class="cb">');
  o.push('<p style="font-size:13px;color:#555;margin-bottom:14px;">Keep this reference handy while building Phase 4 (parent cloud page) and Phase 5 (child relay pages).</p>');
  o.push('<table class="prep-table">');
  o.push('<tr><td>Boolean values</td><td style="font-size:13px;">Synced DE returns <span class="cd">"True"</span> / <span class="cd">"False"</span> (capital T/F). Handle both in AMPscript:<br><span class="cd">IIF(Field(@row,"CommPref_X__c") == "True" OR Field(@row,"CommPref_X__c") == "true", "true", "false")</span></td></tr>');
  o.push('<tr><td>ENT. prefix</td><td style="font-size:13px;">Required for AMPscript <span class="cd">LookupRows</span> on synced DEs from child BU pages. Omitting it returns 0 rows silently.<br>Correct: <span class="cd">LookupRows("ENT.Account_Salesforce_9", "Id", @accountId)</span></td></tr>');
  o.push('<tr><td>CRM writeback</td><td style="font-size:13px;"><span class="cd">UpdateSingleSalesforceObject("Account", @accountId, "CommPref_X__c", "true")</span><br>Uses existing MC Connect relationship — no separate OAuth. Returns 0 silently on FLS failure.</td></tr>');
  o.push('<tr><td>Redirects</td><td style="font-size:13px;"><span class="cd">Redirect()</span> and <span class="cd">HTTPRedirect()</span> cause parse errors in CloudPages.<br>Use: <span class="cd">&lt;meta http-equiv="refresh" content="0;url=%%=v(@url)=%%"&gt;</span></td></tr>');
  o.push('<tr><td>Token params</td><td style="font-size:13px;"><span class="cd">AttributeValue("_subscriberkey")</span> for CloudPagesURL encrypted params.<br><span class="cd">QueryParameter()</span> returns empty for encrypted params — do not use.</td></tr>');
  o.push('<tr><td>writeback URL</td><td style="font-size:13px;"><span class="cd">RequestURL()</span> inside <span class="cd">Concat()</span> causes a parse error. Hardcode the child page URL in a variable, then pass it as the writeback param.</td></tr>');
  o.push("</table></div></div>");

  o.push('<div class="pf">UK Centralized Subscription Center &mdash; Phase 3 Sync Verification &mdash; Internal Tool &mdash; ' + h(generatedAt) + "</div>");
  o.push("</div></body></html>");
  Write(o.join(""));

} // end isAuthorized
</script>
